name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to build and upload (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and upload binaries
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: kluster/go.mod
          cache: true

      - name: Build binaries
        run: |
          mkdir -p dist
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 go build \
                -ldflags="-s -w -X github.com/bytepunx/kluster/cmd.Version=${VERSION}" \
                -o dist/kluster-${GOOS}-${GOARCH} \
                ./kluster
            done
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${VERSION} dist/*
